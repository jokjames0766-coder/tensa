<!DOCTYPE html>
<html>
<head>
  <title>Tensa</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Tensa</h1>
<p class="subtitle">Find Local Services</p>

<div class="topbar">
  <input type="text" id="search" placeholder="Search services...">
</div>

<h3>Register a Service</h3>

<form id="serviceForm">
  <input id="worker" placeholder="Worker name" />
  <input id="name" placeholder="Service type (Electrician, Plumber)" />
  <input id="description" placeholder="Service description" />
  <input id="phone" placeholder="Phone number" />
  <input id="location" placeholder="Location" />

  <button type="submit">Add Service</button>
</form>

<div class="services" id="services" ></div>

</div>

<script src="app.js></script>

</body>
</html>
