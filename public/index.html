<!DOCTYPE html>
<html>
<head>
<title>Tensa - Find Local Services</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Tensa</h1>
<p>Find trusted local workers near you</p>
</header>

<div class="container">

<input id="search" placeholder="🔍 Search services..." onkeyup="searchServices()">

<h2>Register a Service</h2>

<div class="form">

<input id="name" placeholder="Worker name">
<input id="type" placeholder="Service (Electrician, Plumber)">
<input id="description" placeholder="Service description">
<input id="phone" placeholder="Phone number">
<input id="location" placeholder="Location">
<input id="rating" placeholder="Rating (1-5)">
<input id="photo" placeholder="Photo URL">

<button onclick="addService()">Add Service</button>

</div>

<h2>Available Workers</h2>

<div id="services" class="services"></div>

</div>

<script src="app.js"></script>

</body>
</html>
