<!DOCTYPE html>
<html>
<head>
<title>Tensa</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Tensa</h1>
<p>Find trusted local workers</p>
</header>

<div class="container">

<input id="search" placeholder="Search workers..." onkeyup="searchServices()">

<h2>Register Worker</h2>

<input id="name" placeholder="Worker name">
<input id="type" placeholder="Service type">
<input id="description" placeholder="Description">
<input id="phone" placeholder="Phone number">
<input id="location" placeholder="Location">
<input id="rating" placeholder="Rating (1-5)">
<input id="photo" placeholder="Photo URL">

<button onclick="addService()">Add Worker</button>

<h2>Available Workers</h2>

<div id="services"></div>

</div>

<script src="app.js"></script>

</body>
</html>
