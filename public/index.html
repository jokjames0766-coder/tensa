<!DOCTYPE html>
<html>
<head>
  <title>Tensa - Find Local Services</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Find Local Services</h1>

<input id="search" placeholder="Search services..." onkeyup="searchServices()">

<h2>Register a Service</h2>

<input id="name" placeholder="Worker name">

<input id="type" placeholder="Service type (Electrician, Plumber)">

<input id="description" placeholder="Service description">

<input id="phone" placeholder="Phone number">

<input id="location" placeholder="Location">

<input id="rating" placeholder="Rating (1-5)">

<button onclick="addService()">Add Service</button>

<h2>Available Workers</h2>

<div id="services"></div>

<script src="app.js"></script>

</body>
</html>
